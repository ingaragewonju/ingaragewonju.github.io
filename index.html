<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Tags -->
    <title>Global Income Ranking Calculator | What is my rank?</title>
    <meta name="description" content="Calculate your income ranking globally and within your country. Compare by occupation and gender.">
    <!-- Open Graph for Marketing / Social Media -->
    <meta property="og:title" content="소득랭킹계산기 | 내 소득은 몇 등??">
    <meta property="og:description" content="전 세계 10개국 언어 지원. 내 직종에서 나의 소득이 상위 몇 %인지 지금 바로 확인하세요!">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="styles.css?v=10">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Wealth Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Floating Wealth Theme Background Elements -->
    <div class="wealth-icons-container">
        <i class="fa-brands fa-bitcoin floating-icon icon-1"></i>
        <i class="fa-solid fa-dollar-sign floating-icon icon-2"></i>
        <i class="fa-solid fa-chart-line floating-icon icon-3"></i>
        <i class="fa-solid fa-sack-dollar floating-icon icon-4"></i>
        <i class="fa-brands fa-ethereum floating-icon icon-5"></i>
    </div>
    
    <!-- 5-Second Interstitial Ad Overlay -->
    <div id="ad-overlay" class="ad-hidden">
        <div class="ad-content">
            <div class="ad-header">
                <span class="ad-badge">ADVERTISEMENT</span>
                <span class="ad-timer" id="ad-timer">5</span>
            </div>
            <div class="ad-main">
                <h2 id="ad-title">Sponsor Message</h2>
                <p id="ad-network-name" class="ad-network-text">Provided by Global Ad Network</p>
                <div class="ad-banner-placeholder" style="padding:0; overflow:hidden;">
                    <img id="ad-banner-image" src="assets/sample_ad_watch.png" alt="Advertisement" style="width:100%; height:100%; object-fit:cover; border-radius: 12px;">
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="dark-theme">
        <header>
            <div class="logo">
                <span class="gold-text">Rank</span>Wealth
            </div>
            <div class="lang-selector">
                <select id="language" onchange="changeLanguage()">
                    <option value="ko">한국어 (Korean)</option>
                    <option value="en">English</option>
                    <option value="es">Español (Spanish)</option>
                    <option value="zh">中文 (Chinese)</option>
                    <option value="ja">日本語 (Japanese)</option>
                    <option value="hi">हिन्दी (Hindi)</option>
                    <option value="ar">العربية (Arabic)</option>
                    <option value="fr">Français (French)</option>
                    <option value="ru">Русский (Russian)</option>
                    <option value="pt">Português (Portuguese)</option>
                    <option value="de">Deutsch (German)</option>
                </select>
            </div>
        </header>

        <main>
            <!-- Input Form Section -->
            <section id="form-section" class="glass-panel active">
                <h1 id="title-text">내 소득은 몇 등??</h1>
                <p id="subtitle-text" class="subtitle">전 세계와 내 나라에서 나의 위치를 확인하세요.</p>
                
                <form id="calculator-form">
                    <div class="form-group">
                        <label id="label-country" for="country">국가</label>
                        <select id="country" required>
                        </select>
                    </div>

                    <div class="form-group">
                        <label id="label-occupation" for="occupation-large">직종</label>
                        <select id="occupation-large" required onchange="updateMedCategory()">
                            <!-- Generated by JS -->
                        </select>
                        <select id="occupation-med" required onchange="updateSmallCategory()" style="margin-top: 10px; display: none;">
                        </select>
                        <select id="occupation-small" required style="margin-top: 10px; display: none;">
                        </select>
                    </div>

                    <div class="form-group">
                        <label id="label-gender" for="gender">성별</label>
                        <select id="gender" required>
                        </select>
                    </div>

                    <div class="form-group">
                        <label id="label-income-type" for="income-type">급여 기준</label>
                        <select id="income-type" required>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="amount"><span id="label-amount">금액</span> <span id="currency-label" class="gold-text"></span></label>
                        <input type="number" id="amount" placeholder="예: 5000000" required>
                    </div>

                    <button type="submit" id="btn-submit" class="btn-primary">내 등수 확인하기</button>
                </form>
            </section>

            <!-- Results Section -->
            <section id="result-section" class="glass-panel hidden">
                <h2 id="result-title" class="gold-text">소득 랭킹 결과</h2>
                
                <div class="result-list">
                    <!-- Local Job -->
                    <div class="result-item">
                        <div class="chart-col">
                            <h3 id="res-local-job">동일 직종 (국내)</h3>
                            <div class="rank-label"><span class="prefix-top">상위 </span><span id="val-local-job">0</span><span class="suffix-percent">%</span></div>
                            <div class="bar-wrapper">
                                <div class="bar" id="bar-local-job"></div>
                            </div>
                        </div>
                        <div class="analysis-col">
                            <p id="analysis-local-job" class="analysis-text"></p>
                        </div>
                    </div>

                    <!-- Global Job -->
                    <div class="result-item">
                        <div class="chart-col">
                            <h3 id="res-global-job">동일 직종 (세계)</h3>
                            <div class="rank-label"><span class="prefix-top">상위 </span><span id="val-global-job">0</span><span class="suffix-percent">%</span></div>
                            <div class="bar-wrapper">
                                <div class="bar" id="bar-global-job"></div>
                            </div>
                        </div>
                        <div class="analysis-col">
                            <p id="analysis-global-job" class="analysis-text"></p>
                        </div>
                    </div>

                    <!-- Local All -->
                    <div class="result-item">
                        <div class="chart-col">
                            <h3 id="res-local-all">전체 직종 (국내)</h3>
                            <div class="rank-label"><span class="prefix-top">상위 </span><span id="val-local-all">0</span><span class="suffix-percent">%</span></div>
                            <div class="bar-wrapper">
                                <div class="bar" id="bar-local-all"></div>
                            </div>
                        </div>
                        <div class="analysis-col">
                            <p id="analysis-local-all" class="analysis-text"></p>
                        </div>
                    </div>

                    <!-- Global All -->
                    <div class="result-item">
                        <div class="chart-col">
                            <h3 id="res-global-all">전체 직종 (세계)</h3>
                            <div class="rank-label"><span class="prefix-top">상위 </span><span id="val-global-all">0</span><span class="suffix-percent">%</span></div>
                            <div class="bar-wrapper">
                                <div class="bar" id="bar-global-all"></div>
                            </div>
                        </div>
                        <div class="analysis-col">
                            <p id="analysis-global-all" class="analysis-text"></p>
                        </div>
                    </div>
                </div>

                <button id="btn-recalculate" class="btn-secondary" onclick="resetForm()">다시 계산하기</button>
            </section>
        </main>
    </div>
    <script src="app.js?v=11"></script>
</body>
</html>
